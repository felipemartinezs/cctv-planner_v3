<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Field Operations Planner | Executive Presentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&amp;family=Sora:wght@500;600;700;800&amp;display=swap" rel="stylesheet">

        :root {
            --bg: #07111f;
            --panel: rgba(11, 24, 40, 0.82);
            --panel-strong: rgba(9, 19, 32, 0.96);
            --line: rgba(144, 170, 198, 0.16);
            --line-strong: rgba(144, 170, 198, 0.28);
            --text: #eef5ff;
            --muted: #a5b5ca;
            --brand: #79d9ff;
            --brand-strong: #2c95cf;
            --accent: #f1c46c;
            --success: #79d5b0;
            --radius: 30px;
            --radius-sm: 22px;
            --shadow: 0 28px 72px rgba(0, 0, 0, 0.34);
            --max: 1240px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: "Instrument Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(44, 149, 207, 0.22), transparent 30%),
                radial-gradient(circle at top right, rgba(121, 217, 255, 0.12), transparent 28%),
                linear-gradient(180deg, #07111f 0%, #091320 48%, #0a1523 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: radial-gradient(circle at center, black 55%, transparent 96%);
            opacity: 0.44;
            pointer-events: none;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(18px);
            background: rgba(7, 17, 31, 0.78);
            border-bottom: 1px solid rgba(144, 170, 198, 0.12);
        }

        .topbar-inner {
            max-width: var(--max);
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-mark {
            width: 14px;
            height: 14px;
            border-radius: 999px;
            background: linear-gradient(180deg, var(--brand), var(--brand-strong));
            box-shadow: 0 0 24px rgba(121, 217, 255, 0.7);
        }

        .brand-copy {
            display: grid;
            gap: 2px;
        }

        .brand-copy strong {
            font-size: 0.98rem;
            font-weight: 700;
        }

        .brand-copy span {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav a {
            padding: 9px 13px;
            border-radius: 999px;
            color: var(--muted);
            font-size: 0.92rem;
            border: 1px solid transparent;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .nav a:hover,
        .nav a.is-active {
            color: var(--text);
            border-color: rgba(121, 217, 255, 0.22);
            background: rgba(44, 149, 207, 0.12);
        }

        .lang-switch {
            display: inline-flex;
            gap: 6px;
            padding: 5px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
        }

        .lang-btn {
            border: 0;
            background: transparent;
            color: var(--muted);
            font: inherit;
            padding: 8px 12px;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .lang-btn.is-active {
            background: rgba(44, 149, 207, 0.18);
            color: var(--text);
        }

        main {
            position: relative;
            z-index: 1;
        }

        .wrap {
            max-width: var(--max);
            margin: 0 auto;
            padding: 30px 24px 44px;
            display: grid;
            gap: 28px;
        }

        .frame {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: linear-gradient(180deg, rgba(12, 25, 42, 0.84), rgba(9, 19, 32, 0.95));
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        .frame::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(135deg, rgba(121, 217, 255, 0.08), transparent 30%, transparent 70%, rgba(241, 196, 108, 0.04)),
                radial-gradient(circle at top right, rgba(121, 217, 255, 0.08), transparent 28%);
        }

        .frame-body {
            position: relative;
            z-index: 1;
            padding: 34px;
        }

        .hero {
            min-height: 82vh;
            display: grid;
            grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
            gap: 28px;
            align-items: center;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(121, 217, 255, 0.22);
            background: rgba(44, 149, 207, 0.1);
            color: var(--brand);
            font-size: 0.86rem;
            margin-bottom: 18px;
        }

        .eyebrow::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--brand);
        }

        h1,
        h2,
        h3 {
            margin: 0;
            font-family: "Sora", sans-serif;
            line-height: 1.1;
        }

        h1 {
            font-size: clamp(2.8rem, 5.2vw, 5.1rem);
            margin-bottom: 16px;
        }

        h2 {
            font-size: clamp(1.95rem, 3vw, 3rem);
            margin-bottom: 12px;
        }

        h3 {
            font-size: 1.24rem;
            margin-bottom: 12px;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.72;
            font-size: 1rem;
        }

        .lead {
            font-size: 1.1rem;
            max-width: 60ch;
        }

        .section-tag {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.82rem;
            margin-bottom: 14px;
        }

        .hero-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font-size: 0.92rem;
        }

        .chip strong {
            color: var(--brand);
        }

        .image-shell,
        .media {
            border-radius: calc(var(--radius) - 6px);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.38);
        }

        .image-shell img,
        .media img {
            width: 100%;
            display: block;
            height: auto;
        }

        .stack {
            display: grid;
            gap: 22px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 22px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 22px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
        }

        .split {
            display: grid;
            grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.95fr);
            gap: 28px;
            align-items: center;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            padding: 24px;
            background: linear-gradient(180deg, rgba(18, 33, 56, 0.58), rgba(10, 20, 34, 0.86));
            display: grid;
            gap: 14px;
        }

        .card.kicker {
            background: linear-gradient(180deg, rgba(15, 33, 56, 0.84), rgba(11, 21, 36, 0.96));
        }

        .metric {
            font-family: "Sora", sans-serif;
            font-size: 1.25rem;
            color: var(--text);
        }

        .compare {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.02);
        }

        table {
            width: 100%;
            min-width: 680px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 16px 18px;
            text-align: left;
            vertical-align: top;
            color: var(--muted);
            border-bottom: 1px solid var(--line);
            border-right: 1px solid rgba(144, 170, 198, 0.11);
            line-height: 1.6;
        }

        th {
            color: var(--text);
            background: rgba(121, 217, 255, 0.05);
            font-weight: 600;
        }

        th:last-child,
        td:last-child {
            border-right: none;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .step {
            position: relative;
            padding-top: 58px;
        }

        .step-number {
            position: absolute;
            top: 0;
            left: 0;
            font-family: "Sora", sans-serif;
            font-size: 2.6rem;
            color: rgba(121, 217, 255, 0.18);
        }

        .pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pill {
            padding: 9px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
            font-size: 0.9rem;
        }

        .banner {
            display: grid;
            gap: 10px;
            padding: 22px 24px;
            border-radius: 24px;
            border: 1px solid rgba(121, 213, 176, 0.22);
            background: rgba(121, 213, 176, 0.08);
        }

        .banner strong {
            color: var(--success);
            font-size: 0.95rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .footer-note {
            text-align: center;
            padding-top: 8px;
            color: rgba(165, 181, 202, 0.86);
            font-size: 0.9rem;
        }

        @media (max-width: 1080px) {
            .hero,
            .split,
            .grid-4 {
                grid-template-columns: 1fr;
            }

            .grid-3 {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 860px) {
            .topbar-inner {
                align-items: flex-start;
                flex-direction: column;
            }

            .topbar-right,
            .nav {
                justify-content: flex-start;
            }

            .wrap {
                padding: 20px 16px 34px;
            }

            .frame-body {
                padding: 24px;
            }

            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }

            table {
                min-width: 600px;
            }
        }

        @media (max-width: 560px) {
            h1 {
                font-size: 2.35rem;
            }

            h2 {
                font-size: 1.8rem;
            }

            .frame-body,
            .card {
                padding: 20px;
            }

            .chip {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

        const navKeys = ["summary", "problem", "solution", "value", "security", "scale", "next"];
        const state = {
            lang: localStorage.getItem("cio-bilingual-lang") || "es",
            observer: null,
        };

        const el = {
            brandSubtitle: document.getElementById("brand-subtitle"),
            heroEyebrow: document.getElementById("hero-eyebrow"),
            heroTitle: document.getElementById("hero-title"),
            heroLead: document.getElementById("hero-lead"),
            heroChips: document.getElementById("hero-chips"),
            heroImage: document.getElementById("hero-image"),
            summary: document.getElementById("summary-content"),
            problem: document.getElementById("problem-content"),
            solution: document.getElementById("solution-content"),
            value: document.getElementById("value-content"),
            security: document.getElementById("security-content"),
            scale: document.getElementById("scale-content"),
            next: document.getElementById("next-content"),
            footer: document.getElementById("footer-note"),
            navLinks: Array.from(document.querySelectorAll(".nav-link")),
            langButtons: Array.from(document.querySelectorAll(".lang-btn")),
        };

        const renderCards = (items, extraClass = "") =>
            items
                .map(
                    (item) => `
                        <article class="card ${extraClass}">
                            <h3>${item.title}</h3>
                            <p>${item.body}</p>
                        </article>
                    `
                )
                .join("");

        const renderStepCards = (items) =>
            items
                .map(
                    (item, index) => `
                        <article class="card step">
                            <span class="step-number">${String(index + 1).padStart(2, "0")}</span>
                            <h3>${item.title}</h3>
                            <p>${item.body}</p>
                        </article>
                    `
                )
                .join("");

        const renderPills = (items) => items.map((item) => `<span class="pill">${item}</span>`).join("");

        const setActiveLink = (id) => {
            el.navLinks.forEach((link) => {
                link.classList.toggle("is-active", link.getAttribute("href") === `#${id}`);
            });
        };

        const setupObserver = () => {
            if (state.observer) {
                state.observer.disconnect();
            }

            const sections = navKeys.map((key) => document.getElementById(key)).filter(Boolean);

            state.observer = new IntersectionObserver(
                (entries) => {
                    const visible = entries
                        .filter((entry) => entry.isIntersecting)
                        .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];

                    if (visible) {
                        setActiveLink(visible.target.id);
                    }
                },
                {
                    rootMargin: "-35% 0px -45% 0px",
                    threshold: [0.12, 0.24, 0.4, 0.6],
                }
            );

            sections.forEach((section) => state.observer.observe(section));
            setActiveLink("summary");
        };

        const render = (lang) => {
            const t = content[lang];
            state.lang = lang;
            document.documentElement.lang = lang;
            document.title = t.metaTitle;
            localStorage.setItem("cio-bilingual-lang", lang);

            el.brandSubtitle.textContent = t.brandSubtitle;
            el.heroEyebrow.textContent = t.hero.eyebrow;
            el.heroTitle.textContent = t.hero.title;
            el.heroLead.textContent = t.hero.lead;
            el.heroImage.alt = t.hero.imageAlt;
            el.heroChips.innerHTML = t.hero.chips
                .map((chip) => `<div class="chip"><strong>${chip.label}:</strong> ${chip.text}</div>`)
                .join("");

            el.navLinks.forEach((link) => {
                const key = link.dataset.nav;
                link.textContent = t.nav[key];
            });

            el.summary.innerHTML = `
                <div>
                    <p class="section-tag">${t.summary.tag}</p>
                    <h2>${t.summary.title}</h2>
                </div>
                <div class="grid-4">
                    ${renderCards(t.summary.cards, "kicker")}
                </div>
            `;

            el.problem.innerHTML = `
                <div class="split">
                    <div class="stack">
                        <div>
                            <p class="section-tag">${t.problem.tag}</p>
                            <h2>${t.problem.title}</h2>
                        </div>
                        <p>${t.problem.intro}</p>
                        <div class="grid-3">
                            ${renderCards(t.problem.cards)}
                        </div>
                    </div>
                    <div class="media">
                        <img src="./assets/problem.jpg" alt="${t.problem.imageAlt}">
                    </div>
                </div>
                <div class="stack">
                    <div>
                        <p class="section-tag">${t.problem.compareTag}</p>
                        <h2>${t.problem.compareTitle}</h2>
                    </div>
                    <div class="compare">
                        <table>

                                    <th>${t.problem.compareHeaders[1]}</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${t.problem.compareRows
                                    .map(
                                        (row) => `
                                            <tr>
                                                <td>${row[0]}</td>
                                                <td>${row[1]}</td>
                                            </tr>
                                        `
                                    )
                                    .join("")}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            el.solution.innerHTML = `
                <div>
                    <p class="section-tag">${t.solution.tag}</p>
                    <h2>${t.solution.title}</h2>
                </div>
                <div class="grid-3">
                    ${renderStepCards(t.solution.steps)}
                </div>
                <div class="split">
                    <div class="stack">
                        <div class="banner">
                            <strong>${t.solution.resultLabel}</strong>
                            <p>${t.solution.resultText}</p>
                        </div>
                        <div class="pill-row">
                            ${renderPills(t.solution.pills)}
                        </div>
                    </div>
                    <div class="media">
                        <img src="./assets/mobile-ui.jpg" alt="${t.solution.imageAlt}">
                    </div>
                </div>
                <div class="stack">
                    <div>
                        <p class="section-tag">${t.solution.fieldTag}</p>
                        <h2>${t.solution.fieldTitle}</h2>
                    </div>
                    <div class="grid-4">
                        ${renderCards(t.solution.fieldCards)}
                    </div>
                </div>
            `;

            el.value.innerHTML = `
                <div>
                    <p class="section-tag">${t.value.tag}</p>
                    <h2>${t.value.title}</h2>
                </div>
                <div class="grid-3">
                    ${renderCards(t.value.cards)}
                </div>
            `;

            el.security.innerHTML = `
                <div class="split">
                    <div class="stack">
                        <div>
                            <p class="section-tag">${t.security.tag}</p>
                            <h2>${t.security.title}</h2>
                        </div>
                        <p>${t.security.intro}</p>
                        <div class="grid-2">
                            ${renderCards(t.security.cards)}
                        </div>
                    </div>
                    <div class="media">
                        <img src="./assets/security.jpg" alt="${t.security.imageAlt}">
                    </div>
                </div>
            `;

            el.scale.innerHTML = `
                <div>
                    <p class="section-tag">${t.scale.tag}</p>
                    <h2>${t.scale.title}</h2>
                </div>
                <div class="grid-3">
                    ${renderCards(t.scale.cards)}
                </div>
            `;

            el.next.innerHTML = `
                <div>
                    <p class="section-tag">${t.next.tag}</p>
                    <h2>${t.next.title}</h2>
                </div>
                <div class="grid-3">
                    ${renderStepCards(t.next.steps)}
                </div>
                <div class="banner">
                    <strong>${t.next.finalLabel}</strong>
                    <p>${t.next.finalText}</p>
                </div>
            `;

            el.footer.innerHTML = t.footer;

            el.langButtons.forEach((button) => {
                button.classList.toggle("is-active", button.dataset.lang === lang);
            });
        };

        el.langButtons.forEach((button) => {
            button.addEventListener("click", () => {
                render(button.dataset.lang);
                setupObserver();
            });
        });

        render(state.lang);
        setupObserver();
    </script>
